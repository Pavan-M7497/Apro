<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Askora AI - PDF Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg-main: #F4F6F9;
      --bg-sidebar: #FFFFFF;
      --bg-panel: #FFFFFF;
      --accent-gradient: linear-gradient(135deg, #0A84FF, #00C2FF);
      --accent: #0A84FF;
      --accent-light: #E6F2FF;
      --accent-hover: #0073E6;
      --text-dark: #111827;
      --text-medium: #4B5563;
      --text-light: #9CA3AF;
      --border: #E5E7EB;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-full: 9999px;
    }

    html, body, #root { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-dark); overflow: hidden; }

    /* Layout */
    .app { display: flex; height: 100vh; width: 100vw; }

    /* Sidebar */
    .sidebar {
      width: 280px; min-width: 280px; background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 24px 20px; gap: 24px;
      z-index: 10;
    }
    
    /* Askora AI Logo */
    .brand {
      display: flex; align-items: center; gap: 12px; padding: 0 4px;
    }
    .logo-mark {
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    }
    .logo-mark svg { width: 100%; height: 100%; }
    .brand-text { font-size: 22px; font-weight: 700; color: var(--text-dark); letter-spacing: -0.5px; }

    /* Buttons */
    .btn-new-chat {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 14px 16px; border-radius: var(--radius-full);
      background: var(--accent-gradient); color: #fff;
      border: none; font-size: 14px; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 14px rgba(10, 132, 255, 0.25);
      transition: all 0.2s ease;
    }
    .btn-new-chat:hover {
      box-shadow: 0 6px 20px rgba(10, 132, 255, 0.35); transform: translateY(-1px);
    }

    .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; margin-top: 8px; }
    .nav-label { font-size: 11px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding-left: 12px; }
    
    .nav-item {
      padding: 10px 14px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500;
      color: var(--text-medium); cursor: pointer; transition: all 0.2s ease;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-item:hover { background: #F3F4F6; color: var(--text-dark); }
    .nav-item.active { background: var(--accent-light); color: var(--accent); }

    /* Main Area */
    .main { flex: 1; display: flex; flex-direction: column; position: relative; }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px 40px 16px; background: transparent;
    }
    .header-title { font-size: 22px; font-weight: 700; color: var(--text-dark); letter-spacing: -0.5px; }
    .header-user { 
      width: 40px; height: 40px; border-radius: 50%; background: var(--bg-sidebar); 
      border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: var(--shadow-sm); cursor: pointer;
    }

    /* Content Area */
    .content-area {
      flex: 1; display: flex; flex-direction: column; overflow-y: auto;
      padding: 20px 40px 140px; /* space for floating input */
      max-width: 900px; margin: 0 auto; width: 100%;
    }

    /* Empty State & Upload */
    .hero-section {
      margin-top: 40px; display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .hero-tag {
      background: #FEF3C7; color: #D97706; padding: 6px 12px; border-radius: var(--radius-full);
      font-size: 12px; font-weight: 600; margin-bottom: 24px;
    }
    .hero-title { font-size: 32px; font-weight: 700; margin-bottom: 12px; letter-spacing: -1px; }
    .hero-subtitle { font-size: 16px; color: var(--text-medium); max-width: 500px; line-height: 1.5; margin-bottom: 40px; }

    .upload-card {
      background: var(--bg-panel); border: 2px dashed #CBD5E1;
      border-radius: var(--radius-lg); padding: 48px 40px; width: 100%; max-width: 600px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      transition: all 0.2s ease; cursor: pointer; position: relative;
      box-shadow: var(--shadow-sm);
    }
    .upload-card:hover, .upload-card.dragover {
      border-color: var(--accent); background: #F8FAFC; box-shadow: 0 8px 24px rgba(10, 132, 255, 0.08);
    }
    .upload-card.disabled { opacity: 0.6; pointer-events: none; }
    .upload-card input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    
    .upload-icon {
      width: 64px; height: 64px; background: var(--accent-light); color: var(--accent);
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
    }
    .upload-icon svg { width: 32px; height: 32px; }
    
    .upload-text h3 { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--text-dark); }
    .upload-text p { font-size: 14px; color: var(--text-light); }
    
    .upload-btn {
      margin-top: 12px; padding: 10px 24px; background: var(--accent); color: white;
      border-radius: var(--radius-full); font-size: 14px; font-weight: 600; pointer-events: none;
    }

    /* PDF Pill */
    .pdf-pill {
      display: flex; align-items: center; gap: 12px; background: var(--bg-panel);
      padding: 12px 20px; border-radius: var(--radius-full); box-shadow: var(--shadow-sm);
      margin: 0 auto 32px; max-width: fit-content; border: 1px solid var(--border);
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    
    .pdf-pill-icon { color: var(--accent); display: flex; }
    .pdf-pill-info { display: flex; flex-direction: column; }
    .pdf-pill-name { font-size: 14px; font-weight: 600; color: var(--text-dark); max-width: 240px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pdf-pill-size { font-size: 12px; color: var(--text-light); }
    .pdf-pill-remove { 
      background: none; border: none; color: var(--text-light); cursor: pointer; padding: 6px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; margin-left: 12px; transition: 0.2s;
    }
    .pdf-pill-remove:hover { background: #FEE2E2; color: #EF4444; }

    /* Chat Messages */
    .chat-container { display: flex; flex-direction: column; gap: 24px; padding-bottom: 20px; }
    
    .message { display: flex; gap: 16px; max-width: 85%; animation: fadeIn 0.3s ease; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .avatar {
      width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .avatar.bot { background: var(--accent-gradient); color: white; box-shadow: 0 4px 12px rgba(10, 132, 255, 0.2); }
    .avatar.user { background: var(--bg-panel); border: 1px solid var(--border); color: var(--text-dark); box-shadow: var(--shadow-sm); }
    
    .bubble {
      padding: 16px 20px; border-radius: var(--radius-lg); font-size: 15px; line-height: 1.6; color: var(--text-dark);
    }
    .message.user .bubble {
      background: var(--bg-panel); border: 1px solid var(--border);
      border-bottom-right-radius: 4px; box-shadow: var(--shadow-sm);
    }
    .message.bot .bubble {
      background: transparent; padding: 8px 0; /* Cleaner look for AI, no box */
    }

    /* Floating Input Box */
    .input-container {
      position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 80px); max-width: 800px;
    }
    .input-wrapper {
      background: var(--bg-panel); border-radius: var(--radius-full);
      box-shadow: var(--shadow-lg); border: 1px solid rgba(0,0,0,0.06);
      padding: 8px 8px 8px 24px; display: flex; align-items: center; gap: 12px;
      transition: all 0.3s ease;
    }
    .input-wrapper:focus-within { box-shadow: 0 16px 40px rgba(10, 132, 255, 0.12); border-color: rgba(10, 132, 255, 0.3); }
    
    .input-wrapper textarea {
      flex: 1; border: none; outline: none; background: transparent;
      font-family: 'Inter', sans-serif; font-size: 15px; color: var(--text-dark);
      resize: none; max-height: 120px; padding: 12px 0; line-height: 1.5;
    }
    .input-wrapper textarea::placeholder { color: var(--text-light); }
    .input-wrapper textarea::-webkit-scrollbar { display: none; }
    
    .send-btn {
      width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: white;
      border: none; display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: all 0.2s ease; flex-shrink: 0; box-shadow: 0 4px 12px rgba(10, 132, 255, 0.2);
    }
    .send-btn:hover:not(:disabled) { transform: scale(1.05); background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; background: var(--text-light); }

    /* Typing Indicator */
    .typing-indicator { display: flex; gap: 4px; padding: 12px 0; }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-light); animation: bounce 1.4s infinite ease-in-out; }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

    /* Custom Scrollbar for Content */
    .content-area::-webkit-scrollbar { width: 6px; }
    .content-area::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 6px; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .header { padding: 16px 20px; }
      .content-area { padding: 0 20px 120px; }
      .input-container { width: calc(100% - 40px); bottom: 20px; }
      .upload-card { padding: 32px 20px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const MOCK_HISTORY = [
      "All Writer",
      "Favorites",
      "Writing & Content",
      "Academic & Education",
    ];

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    // Askora AI SVG Logo component
    const LogoSVG = () => (
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M49.9998 32.5L25 72.5H35L49.9998 48L65 72.5H75L49.9998 32.5Z" fill="#111827"/>
        <path d="M35 72.5L49.9998 48L65 72.5C65 72.5 58 78 49.9998 78C42 78 35 72.5 35 72.5Z" fill="#00C2FF"/>
        <circle cx="50" cy="65" r="5" fill="#0A84FF"/>
      </svg>
    );

    // Document SVG Icon
    const DocIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
        <polyline points="10 9 9 9 8 9"></polyline>
      </svg>
    );

    function App() {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [pdfFile, setPdfFile] = useState(null);
      const [fileId, setFileId] = useState(null);
      const [isUploading, setIsUploading] = useState(false);
      const [isAsking, setIsAsking] = useState(false);
      const [dragOver, setDragOver] = useState(false);
      const [activeHistory, setActiveHistory] = useState(null);
      
      const chatEndRef = useRef(null);
      const textareaRef = useRef(null);
      const fileInputRef = useRef(null);

      const BACKEND_URL = "http://localhost:8000";

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, isAsking]);


  // Upload PDF to backend
  const uploadToBackend = async (file) => {
    if (!file) {
      alert("Please select a file");
      return;
    }

    setIsUploading(true);

    const formData = new FormData();
    formData.append("file", file);

    try {
      console.log("Uploading file:", file.name);

      const res = await fetch(`${BACKEND_URL}/upload`, {
        method: "POST",
        body: formData,
      });

      // Handle non-JSON errors safely
      const text = await res.text();
      console.log("Raw response:", text);

      let data;
      try {
        data = JSON.parse(text);
      } catch {
        throw new Error("Invalid JSON response from backend");
      }

      if (res.ok) {
        setFileId(data.file_id);
        setPdfFile(file);

        setMessages([
          {
            id: Date.now(),
            role: "bot",
            text: `PDF uploaded successfully! Extracted ${data.word_count} words.`,
          },
        ]);

        console.log("Upload success:", data);
      } else {
        console.error("Backend error:", data);
        alert(data.detail || "Upload failed");

        setPdfFile(null);
        setFileId(null);
      }
    } catch (err) {
      console.error("Upload error:", err);

      alert(
        "Error connecting to backend.\nCheck:\n1. Backend running\n2. Correct URL\n3. CORS enabled"
      );

      setPdfFile(null);
      setFileId(null);
    } finally {
      setIsUploading(false);
    }
  };

  // Handle file selection
  const handleFileChange = (e) => {
    const file = e.target.files[0];

    if (!file) return;

    // Allow only PDF
    if (file.type !== "application/pdf") {
      alert("Only PDF files are allowed");
      return;
    }

    uploadToBackend(file);
  };

 





     
      

      const handleDrop = (e) => {
        e.preventDefault();
        setDragOver(false);
        const file = e.dataTransfer.files?.[0];
        if (file && file.type === "application/pdf") {
          uploadToBackend(file);
        }
      };

      const handleSend = async () => {
        const text = input.trim();
        if (!text || isAsking) return;
        
        if (!fileId) {
          alert("Please wait for the PDF to finish uploading or upload a new one.");
          return;
        }

        const newMsg = { id: Date.now(), role: "user", text };
        setMessages(prev => [...prev, newMsg]);
        setInput("");
        setIsAsking(true);
        
        if (textareaRef.current) {
          textareaRef.current.style.height = "auto";
        }

        try {
          const res = await fetch(`${BACKEND_URL}/ask`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ file_id: fileId, question: text }),
          });
          const data = await res.json();
          
          if (res.ok) {
            setMessages(prev => [...prev, {
              id: Date.now(),
              role: "bot",
              text: data.answer
            }]);
          } else {
            setMessages(prev => [...prev, {
              id: Date.now(),
              role: "bot",
              text: "Error: " + (data.detail || "Failed to get answer")
            }]);
          }
        } catch (err) {
          console.error(err);
          setMessages(prev => [...prev, {
            id: Date.now(),
            role: "bot",
            text: "Error connecting to backend. Is the server running?"
          }]);
        } finally {
          setIsAsking(false);
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      };

      const handleTextareaInput = (e) => {
        setInput(e.target.value);
        e.target.style.height = "auto";
        e.target.style.height = Math.min(e.target.scrollHeight, 120) + "px";
      };

      return (
        <div className="app">
          {/* Sidebar */}
          <aside className="sidebar">
            <div className="brand">
              <div className="logo-mark"><LogoSVG /></div>
              <div className="brand-text">Askora AI</div>
            </div>

            <button className="btn-new-chat" onClick={() => { setMessages([]); setPdfFile(null); setFileId(null); setActiveHistory(null); }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              New Question
            </button>

            <div className="nav-menu">
              <div className="nav-label">Assistant Tools</div>
              {MOCK_HISTORY.map((h, i) => (
                <div
                  key={i}
                  className={`nav-item ${activeHistory === i ? "active" : ""}`}
                  onClick={() => setActiveHistory(i)}
                >
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                  {h}
                </div>
              ))}
            </div>
          </aside>

          {/* Main */}
          <main className="main">
            {/* Header */}
            <header className="header">
              <div className="header-title">
                {pdfFile ? pdfFile.name : "Welcome back!"}
              </div>
              <div className="header-user">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              </div>
            </header>

            {/* Content Area */}
            <div className="content-area">
              
              {!pdfFile ? (
                <div className="hero-section">
                  <div className="hero-tag">Get Premium Access</div>
                  <h1 className="hero-title">Askora AI - Your Personal Assistant</h1>
                  <p className="hero-subtitle">Smart, task-focused AI tools designed to boost productivity, streamline writing, and support your academic and professional goals.</p>
                  
                  <div
                    className={`upload-card ${dragOver ? "dragover" : ""} ${isUploading ? "disabled" : ""}`}
                    onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                    onDragLeave={() => setDragOver(false)}
                    onDrop={handleDrop}
                  >
                    <input type="file" accept="application/pdf" onChange={handleFileChange} ref={fileInputRef} disabled={isUploading} />
                    <div className="upload-icon">
                      {isUploading ? (
                        <div className="typing-indicator"><div className="typing-dot" style={{background:"currentColor"}}></div><div className="typing-dot" style={{background:"currentColor"}}></div><div className="typing-dot" style={{background:"currentColor"}}></div></div>
                      ) : (
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                      )}
                    </div>
                    <div className="upload-text">
                      <h3>{isUploading ? "Processing Document..." : "Upload a PDF Document"}</h3>
                      <p>{isUploading ? "Extracting text and generating embeddings." : "Drag & drop or click to browse files"}</p>
                    </div>
                    {!isUploading && <div className="upload-btn">Select PDF</div>}
                  </div>
                </div>
              ) : (
                <div className="chat-container">
                  {messages.length === 0 && (
                    <div className="pdf-pill">
                      <div className="pdf-pill-icon"><DocIcon /></div>
                      <div className="pdf-pill-info">
                        <span className="pdf-pill-name" title={pdfFile.name}>{pdfFile.name}</span>
                        <span className="pdf-pill-size">{formatBytes(pdfFile.size)}</span>
                      </div>
                      <button className="pdf-pill-remove" onClick={() => {setPdfFile(null); setFileId(null); setMessages([]);}}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                      </button>
                    </div>
                  )}

                  {messages.map(msg => (
                    <div key={msg.id} className={`message ${msg.role}`}>
                      <div className={`avatar ${msg.role}`}>
                        {msg.role === "user" ? (
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        ) : (
                          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M21.18 8.02c-1-2.3-2.85-4.17-5.16-5.18"></path><path d="M21.18 15.98c-1 2.3-2.85 4.17-5.16 5.18"></path><path d="M12 2v20"></path></svg>
                        )}
                      </div>
                      <div className="bubble" dangerouslySetInnerHTML={{__html: msg.text.replace(/\n/g, '<br/>')}} />
                    </div>
                  ))}
                  
                  {isAsking && (
                    <div className="message bot">
                      <div className="avatar bot">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M21.18 8.02c-1-2.3-2.85-4.17-5.16-5.18"></path><path d="M21.18 15.98c-1 2.3-2.85 4.17-5.16 5.18"></path><path d="M12 2v20"></path></svg>
                      </div>
                      <div className="bubble">
                        <div className="typing-indicator">
                          <div className="typing-dot"></div>
                          <div className="typing-dot"></div>
                          <div className="typing-dot"></div>
                        </div>
                      </div>
                    </div>
                  )}
                  <div ref={chatEndRef} />
                </div>
              )}
            </div>

            {/* Input area */}
            <div className="input-container">
              <div className="input-wrapper">
                <textarea
                  ref={textareaRef}
                  rows={1}
                  placeholder={pdfFile ? "Ask a question about your document..." : "Upload a PDF first, then ask a question..."}
                  value={input}
                  onChange={handleTextareaInput}
                  onKeyDown={handleKeyDown}
                  disabled={!pdfFile || isUploading || isAsking}
                />
                <button
                  className="send-btn"
                  onClick={handleSend}
                  disabled={!input.trim() || !pdfFile || isUploading || isAsking}
                  title={!pdfFile ? "Upload a PDF first" : "Send message"}
                >
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
              </div>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
